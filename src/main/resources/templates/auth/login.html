<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - Spring 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-center">로그인</h4>

                    <!-- 회원가입 완료 메시지 -->
                    <div th:if="${param.registered}" class="alert alert-success">
                        회원가입이 완료되었습니다. 로그인해주세요!
                    </div>

                    <!-- 로그인 실패 메시지 -->
                    <div th:if="${param.error}" class="alert alert-danger">
                        아이디 또는 비밀번호가 올바르지 않습니다.
                    </div>

                    <!-- Spring Security가 /auth/login POST를 처리함 -->
                    <form th:action="@{/auth/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">아이디</label>
                            <input type="text" id="username" name="username"
                                   class="form-control" placeholder="아이디 입력" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" id="password" name="password"
                                   class="form-control" placeholder="비밀번호 입력" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">로그인</button>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <span class="text-muted">계정이 없으신가요?</span>
                        <a th:href="@{/auth/register}" class="ms-1">회원가입</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
