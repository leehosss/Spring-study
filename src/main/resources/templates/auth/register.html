<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Spring 게시판</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-center">회원가입</h4>

                    <!-- 중복 아이디 오류 -->
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/auth/register}" th:object="${registerForm}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">아이디</label>
                            <input type="text" id="username" th:field="*{username}"
                                   class="form-control" placeholder="3~20자">
                            <!-- 유효성 오류 메시지 -->
                            <div th:if="${#fields.hasErrors('username')}" class="text-danger small mt-1"
                                 th:errors="*{username}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">비밀번호</label>
                            <input type="password" id="password" th:field="*{password}"
                                   class="form-control" placeholder="4자 이상">
                            <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1"
                                 th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="nickname" class="form-label">닉네임</label>
                            <input type="text" id="nickname" th:field="*{nickname}"
                                   class="form-control" placeholder="게시판에 표시될 이름">
                            <div th:if="${#fields.hasErrors('nickname')}" class="text-danger small mt-1"
                                 th:errors="*{nickname}"></div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">가입하기</button>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <span class="text-muted">이미 계정이 있으신가요?</span>
                        <a th:href="@{/auth/login}" class="ms-1">로그인</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
