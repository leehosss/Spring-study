spring.application.name=springstudy

# ========== MySQL 설정 ==========
# MySQL에서 미리 생성: CREATE DATABASE spring_board DEFAULT CHARACTER SET utf8mb4;
spring.datasource.url=jdbc:mysql://localhost:3306/spring_board?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== JPA 설정 ==========
# update: 앱 시작 시 테이블 자동 생성/수정 (개발용)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========== Thymeleaf 설정 (개발 중 캐시 끄기) ==========
spring.thymeleaf.cache=false
